type Category {
  categoryId: Int!
  name: String!
  description: String
  createdAt: String!
  productCount: Int!
}

extend type Query {
  categories: [Category!]!
  category(categoryId: Int!): Category
}

extend type Mutation {
  createCategory(name: String!, description: String): Category!
  updateCategory(categoryId: Int!, name: String, description: String): Category!
  deleteCategory(categoryId: Int!): Category!
}
